  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificação básica de segredos (LGPD)
        run: |
          if git grep -nIE '(PASSWORD|SECRET|API_KEY|TOKEN)\s*=\s*[^[:space:]]+' -- ':!*.example' ':!.github/*' ; then
            echo "::error::Possível segredo versionado encontrado. Remova antes do merge (PGCS / LGPD)."
            exit 1
          fi
          echo "Nenhum segredo óbvio encontrado."
