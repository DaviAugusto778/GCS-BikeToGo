name: CI

# CFG-01 — Pipeline de integração contínua (PGCS 4.3)
# Build, testes e lint em cada Pull Request para a branch protegida main.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # COD-02 é um app Java/Swing (pacote pooTrabalhoFinal). A toolchain é
      # FIXADA para garantir reprodutibilidade byte-a-byte do artefato BLD-01
      # (ver docs/auditorias/RELATORIO-TECNICO_Etapa2_Build-SBOM-VDD.md §5).
      - name: Configurar JDK (toolchain fixada)
        uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: '21'

      - name: Build reprodutível (CFG-01) + verificação de determinismo
        run: bash config/build.sh --verify

      - name: Publicar artefato (BLD-01)
        uses: actions/upload-artifact@v4
        with:
          name: biketogo-jar
          path: build/biketogo-*.jar

      - name: Lint
        run: |
          echo "TODO: lint do código Java (ex.: checkstyle/spotless) — definir em ARQ-01"

      - name: Testes
        run: |
          echo "TODO: executar testes de tests/automatizados/ (TST-02) — ainda ausentes"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificação básica de segredos (LGPD)
        run: |
          if git grep -nIE '(PASSWORD|SECRET|API_KEY|TOKEN)\s*=\s*[^[:space:]]+' -- ':!*.example' ':!.github/*' ; then
            echo "::error::Possível segredo versionado encontrado. Remova antes do merge (PGCS / LGPD)."
            exit 1
          fi
          echo "Nenhum segredo óbvio encontrado."
